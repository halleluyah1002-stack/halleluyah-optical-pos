services:
  - type: web
    name: halleluyah-pos
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    plan: free
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: halleluyah-pos-db
          property: connectionString

databases:
  - name: halleluyah-pos-db
    plan: free
