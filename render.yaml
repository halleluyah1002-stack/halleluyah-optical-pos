services:
  - type: web
    name: halleluyah-pos
    env: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "gunicorn app:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: halleluyah-pos-db
          property: connectionString

databases:
  - name: halleluyah-pos-db
    plan: free
